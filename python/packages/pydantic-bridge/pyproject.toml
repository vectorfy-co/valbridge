[project]
name = "valbridge-pydantic-bridge"
version = "0.1.0"
description = "Workspace-local Pydantic bridge helpers for valbridge"
requires-python = ">=3.10"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/valbridge_pydantic_bridge"]
