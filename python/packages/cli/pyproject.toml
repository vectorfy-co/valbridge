[project]
name = "valbridge-cli"
version = "1.1.0"
description = "Installable CLI for bidirectional Zod and Pydantic conversion"
requires-python = ">=3.10"
readme = "README.md"
license = { text = "MIT" }
authors = [{ name = "vectorfyco" }]
maintainers = [{ name = "vectorfyco" }]
keywords = [
    "valbridge",
    "cli",
    "code-generation",
    "zod",
    "pydantic",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
]
dependencies = []

[project.urls]
Homepage = "https://github.com/vectorfy-co/valbridge"
Documentation = "https://github.com/vectorfy-co/valbridge"
Repository = "https://github.com/vectorfy-co/valbridge"
Issues = "https://github.com/vectorfy-co/valbridge/issues"
Changelog = "https://github.com/vectorfy-co/valbridge/blob/main/CHANGELOG.md"

[project.scripts]
valbridge = "valbridge_cli.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/valbridge_cli"]
