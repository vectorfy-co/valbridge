name: Compliance Check

on:
  pull_request:
    paths:
      - "*/packages/adapters/**"
      - "*/packages/core/**"
      - "*/.ci/**"
      - "cli/compliance/**"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: compliance-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  detect-adapters:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
      has_adapters: ${{ steps.detect.outputs.has_adapters }}
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0 # need history for diff

      - name: Detect changed adapters
        id: detect
        run: |
          # Determine what changed
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.sha }}"
          elif [ "${{ github.event_name }}" = "push" ]; then
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
          else
            # workflow_dispatch - run all adapters
            BASE=""
            HEAD=""
          fi

          # Check if we need to run all adapters (cli/compliance or core changed, or manual trigger)
          RUN_ALL="false"
          if [ -z "$BASE" ]; then
            RUN_ALL="true"
            echo "Manual trigger - running all adapters"
          else
            CORE_CHANGES=$(git diff --name-only "$BASE" "$HEAD" -- cli/compliance/ */packages/core/ */.ci/ 2>/dev/null || echo "")
            if [ -n "$CORE_CHANGES" ]; then
              RUN_ALL="true"
              echo "Core or CLI compliance changed - running all adapters"
            fi
          fi

          # Build list of adapters to test
          # Format: [{adapter, lang, runtime}, ...]
          MATRIX="[]"

          # Find all adapters across all languages
          # Convention: {lang}/packages/adapters/{adapter}
          for adapter_dir in */packages/adapters/*; do
            [ -d "$adapter_dir" ] || continue

            # Extract lang and adapter from path
            lang=$(echo "$adapter_dir" | cut -d'/' -f1)
            adapter=$(echo "$adapter_dir" | cut -d'/' -f4)

            # Require setup script for each lang
            if [ ! -f "$lang/.ci/setup.sh" ]; then
              echo "::error::Missing setup script: $lang/.ci/setup.sh"
              exit 1
            fi

            # Read runtime from lang's .ci/runtime.txt
            runtime=$(cat "$lang/.ci/runtime.txt" 2>/dev/null | tr -d '[:space:]' || echo "")
            if [ -z "$runtime" ]; then
              echo "::error::Missing or empty runtime file: $lang/.ci/runtime.txt"
              exit 1
            fi

            if [ "$RUN_ALL" = "true" ]; then
              # Add all adapters
              MATRIX=$(echo "$MATRIX" | jq -c ". + [{\"adapter\": \"$adapter\", \"lang\": \"$lang\", \"runtime\": \"$runtime\"}]")
            else
              # Check if any files in this adapter changed
              ADAPTER_PATH="$lang/packages/adapters/$adapter/"
              CHANGED_FILES=$(git diff --name-only "$BASE" "$HEAD" -- "$ADAPTER_PATH" 2>/dev/null || echo "")
              if [ -n "$CHANGED_FILES" ]; then
                MATRIX=$(echo "$MATRIX" | jq -c ". + [{\"adapter\": \"$adapter\", \"lang\": \"$lang\", \"runtime\": \"$runtime\"}]")
              fi
            fi
          done

          # Output results
          if [ "$MATRIX" = "[]" ]; then
            echo "matrix=[]" >> $GITHUB_OUTPUT
            echo "has_adapters=false" >> $GITHUB_OUTPUT
            echo "No adapters to test"
          else
            echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
            echo "has_adapters=true" >> $GITHUB_OUTPUT
            echo "Adapters to test: $MATRIX"
          fi

  compliance:
    needs: detect-adapters
    if: needs.detect-adapters.outputs.has_adapters == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect-adapters.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-go@v6.4.0
        with:
          go-version: "1.24"
          cache-dependency-path: cli/go.sum

      - uses: pnpm/action-setup@v5.0.0
        if: matrix.runtime == 'node'
        with:
          version: 10

      - uses: actions/setup-node@v6.3.0
        if: matrix.runtime == 'node'
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: typescript/pnpm-lock.yaml

      - uses: actions/setup-python@v6.2.0
        if: matrix.runtime == 'python'
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v8.0.0
        if: matrix.runtime == 'python'

      - name: Setup ${{ matrix.lang }}
        run: source "${{ matrix.lang }}/.ci/setup.sh"

      - name: Run compliance for ${{ matrix.adapter }}
        run: go run . compliance --dev-report --lang ${{ matrix.lang }} --adapter-path ../${{ matrix.lang }}/packages/adapters/${{ matrix.adapter }}
        working-directory: cli

      - name: Check for uncommitted changes
        run: |
          RESULTS_DIR="${{ matrix.lang }}/packages/adapters/${{ matrix.adapter }}/compliance/results/"
          if [[ -n $(git status --porcelain "$RESULTS_DIR") ]]; then
            # Check if there are real changes beyond just the timestamp line
            real_changes=$(git diff "$RESULTS_DIR" | grep -E '^[-+]' | grep -v '^[-+][-+][-+]' | grep -v '^[-+]Generated:' || true)
            if [[ -n "$real_changes" ]]; then
              echo "::error::Compliance results are out of date for ${{ matrix.adapter }}"
              echo ""
              echo "The following files have changed:"
              git status --porcelain "$RESULTS_DIR"
              echo ""
              echo "Please run 'valbridge compliance --dev-report' in the adapter directory and commit the results."
              echo ""
              echo "Diff:"
              git diff "$RESULTS_DIR"
              exit 1
            fi
            echo "✓ Compliance results only have timestamp changes (allowed)"
          else
            echo "✓ Compliance results are up to date"
          fi

  compliance-result:
    runs-on: ubuntu-latest
    needs: [detect-adapters, compliance]
    if: always()
    steps:
      - name: Check compliance results
        run: |
          if [ "${{ needs.compliance.result }}" = "failure" ]; then
            echo "Compliance checks failed"
            exit 1
          fi
          echo "All compliance checks passed (or skipped)"
