name: Publish Python Package

on:
  workflow_dispatch:
    inputs:
      package:
        description: Python package to publish
        required: true
        type: choice
        options:
          - core
          - client
          - pydantic
          - pydantic-extractor
          - pydantic-bridge

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v4

      - name: Resolve package directory
        id: pkg
        run: |
          case "${{ inputs.package }}" in
            core)
              echo "package_dir=python/packages/core" >>"$GITHUB_OUTPUT"
              ;;
            client)
              echo "package_dir=python/packages/client" >>"$GITHUB_OUTPUT"
              ;;
            pydantic)
              echo "package_dir=python/packages/adapters/pydantic" >>"$GITHUB_OUTPUT"
              ;;
            pydantic-extractor)
              echo "package_dir=python/packages/pydantic-extractor" >>"$GITHUB_OUTPUT"
              ;;
            pydantic-bridge)
              echo "package_dir=python/packages/pydantic-bridge" >>"$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported package: ${{ inputs.package }}" >&2
              exit 1
              ;;
          esac

      - name: Install dependencies
        run: uv sync
        working-directory: python

      - name: Build distribution
        run: uv build --out-dir dist --clear
        working-directory: ${{ steps.pkg.outputs.package_dir }}

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: ${{ steps.pkg.outputs.package_dir }}/dist
