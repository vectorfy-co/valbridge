name: Release Please

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      manual_release_bundle:
        description: Publish the coordinated package bundle from a Git ref
        required: false
        type: string
      manual_python_package:
        description: Python package to publish via trusted publishing
        required: false
        type: choice
        options:
          - core
          - client
          - pydantic
          - pydantic-extractor
          - pydantic-bridge
      manual_npm_package:
        description: npm package to publish
        required: false
        type: choice
        options:
          - core
          - client
          - zod
          - zod-extractor
          - zod-bridge
      manual_source_ref:
        description: Git ref to check out for manual publish
        required: false
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    outputs:
      ts-core--release_created: ${{ steps.release.outputs['typescript/packages/core--release_created'] }}
      ts-client--release_created: ${{ steps.release.outputs['typescript/packages/client--release_created'] }}
      ts-zod--release_created: ${{ steps.release.outputs['typescript/packages/adapters/zod--release_created'] }}
      ts-zod-extractor--release_created: ${{ steps.release.outputs['typescript/packages/zod-extractor--release_created'] }}
      ts-zod-bridge--release_created: ${{ steps.release.outputs['typescript/packages/zod-bridge--release_created'] }}
      py-core--release_created: ${{ steps.release.outputs['python/packages/core--release_created'] }}
      py-client--release_created: ${{ steps.release.outputs['python/packages/client--release_created'] }}
      py-pydantic--release_created: ${{ steps.release.outputs['python/packages/adapters/pydantic--release_created'] }}
      py-pydantic-extractor--release_created: ${{ steps.release.outputs['python/packages/pydantic-extractor--release_created'] }}
      py-pydantic-bridge--release_created: ${{ steps.release.outputs['python/packages/pydantic-bridge--release_created'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Trigger CI for release-please PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          prs=$(gh pr list --repo ${{ github.repository }} --state open --json headRefName --jq '.[] | select(.headRefName | startswith("release-please--")) | .headRefName')

          for branch in $prs; do
            echo "Dispatching CI for branch: $branch"
            gh workflow run CI --repo ${{ github.repository }} --ref "$branch"
          done

  release-ts:
    needs: release-please
    if: |
      needs.release-please.outputs.ts-core--release_created == 'true' ||
      needs.release-please.outputs.ts-client--release_created == 'true' ||
      needs.release-please.outputs.ts-zod--release_created == 'true' ||
      needs.release-please.outputs.ts-zod-extractor--release_created == 'true' ||
      needs.release-please.outputs.ts-zod-bridge--release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: typescript

      - name: Build packages
        run: pnpm run build
        working-directory: typescript

      - name: Typecheck packages
        run: pnpm run typecheck
        working-directory: typescript

      - name: Publish @vectorfyco/valbridge-core
        if: needs.release-please.outputs.ts-core--release_created == 'true'
        run: npm publish --access public
        working-directory: typescript/packages/core

      - name: Publish @vectorfyco/valbridge
        if: needs.release-please.outputs.ts-client--release_created == 'true'
        run: npm publish --access public
        working-directory: typescript/packages/client

      - name: Publish @vectorfyco/valbridge-zod
        if: needs.release-please.outputs.ts-zod--release_created == 'true'
        run: npm publish --access public
        working-directory: typescript/packages/adapters/zod

      - name: Publish @vectorfyco/valbridge-zod-extractor
        if: needs.release-please.outputs.ts-zod-extractor--release_created == 'true'
        run: npm publish --access public
        working-directory: typescript/packages/zod-extractor

      - name: Publish @vectorfyco/valbridge-zod-bridge
        if: needs.release-please.outputs.ts-zod-bridge--release_created == 'true'
        run: npm publish --access public
        working-directory: typescript/packages/zod-bridge

  release-py:
    needs: release-please
    if: |
      (matrix.package_key == 'core' && needs.release-please.outputs.py-core--release_created == 'true') ||
      (matrix.package_key == 'client' && needs.release-please.outputs.py-client--release_created == 'true') ||
      (matrix.package_key == 'pydantic' && needs.release-please.outputs.py-pydantic--release_created == 'true') ||
      (matrix.package_key == 'pydantic-extractor' && needs.release-please.outputs.py-pydantic-extractor--release_created == 'true') ||
      (matrix.package_key == 'pydantic-bridge' && needs.release-please.outputs.py-pydantic-bridge--release_created == 'true')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - package_key: core
            package_dir: python/packages/core
          - package_key: client
            package_dir: python/packages/client
          - package_key: pydantic
            package_dir: python/packages/adapters/pydantic
          - package_key: pydantic-extractor
            package_dir: python/packages/pydantic-extractor
          - package_key: pydantic-bridge
            package_dir: python/packages/pydantic-bridge
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync
        working-directory: python

      - name: Build distribution
        run: uv build --out-dir dist --clear
        working-directory: ${{ matrix.package_dir }}

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: ${{ matrix.package_dir }}/dist

  manual-release-py:
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.manual_python_package != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.manual_source_ref || github.ref_name }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v4

      - name: Resolve package directory
        id: pkg
        run: |
          case "${{ github.event.inputs.manual_python_package }}" in
            core)
              echo "package_dir=python/packages/core" >>"$GITHUB_OUTPUT"
              ;;
            client)
              echo "package_dir=python/packages/client" >>"$GITHUB_OUTPUT"
              ;;
            pydantic)
              echo "package_dir=python/packages/adapters/pydantic" >>"$GITHUB_OUTPUT"
              ;;
            pydantic-extractor)
              echo "package_dir=python/packages/pydantic-extractor" >>"$GITHUB_OUTPUT"
              ;;
            pydantic-bridge)
              echo "package_dir=python/packages/pydantic-bridge" >>"$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported package: ${{ github.event.inputs.manual_python_package }}" >&2
              exit 1
              ;;
          esac

      - name: Install dependencies
        run: uv sync
        working-directory: python

      - name: Build distribution
        run: uv build --out-dir dist --clear
        working-directory: ${{ steps.pkg.outputs.package_dir }}

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: ${{ steps.pkg.outputs.package_dir }}/dist

  manual-release-ts:
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.manual_npm_package != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.manual_source_ref || github.ref_name }}

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Resolve package directory
        id: pkg
        run: |
          case "${{ github.event.inputs.manual_npm_package }}" in
            core)
              echo "package_dir=typescript/packages/core" >>"$GITHUB_OUTPUT"
              ;;
            client)
              echo "package_dir=typescript/packages/client" >>"$GITHUB_OUTPUT"
              ;;
            zod)
              echo "package_dir=typescript/packages/adapters/zod" >>"$GITHUB_OUTPUT"
              ;;
            zod-extractor)
              echo "package_dir=typescript/packages/zod-extractor" >>"$GITHUB_OUTPUT"
              ;;
            zod-bridge)
              echo "package_dir=typescript/packages/zod-bridge" >>"$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported package: ${{ github.event.inputs.manual_npm_package }}" >&2
              exit 1
              ;;
          esac

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: typescript

      - name: Build packages
        run: pnpm run build
        working-directory: typescript

      - name: Typecheck packages
        run: pnpm run typecheck
        working-directory: typescript

      - name: Publish to npm
        run: npm publish --access public
        working-directory: ${{ steps.pkg.outputs.package_dir }}

  manual-release-bundle-ts:
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.manual_release_bundle == 'all' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.manual_source_ref || github.ref_name }}

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: typescript

      - name: Build packages
        run: pnpm run build
        working-directory: typescript

      - name: Typecheck packages
        run: pnpm run typecheck
        working-directory: typescript

      - name: Publish coordinated npm packages
        run: |
          publish_if_missing() {
            local package_dir="$1"
            local package_name
            local package_version
            package_name=$(node -p "require('./${package_dir}/package.json').name")
            package_version=$(node -p "require('./${package_dir}/package.json').version")

            if npm view "${package_name}@${package_version}" version >/dev/null 2>&1; then
              echo "Skipping ${package_name}@${package_version}; already published"
              return 0
            fi

            echo "Publishing ${package_name}@${package_version}"
            (cd "${package_dir}" && npm publish --access public)
          }

          publish_if_missing "typescript/packages/core"
          publish_if_missing "typescript/packages/client"
          publish_if_missing "typescript/packages/adapters/zod"
          publish_if_missing "typescript/packages/zod-extractor"
          publish_if_missing "typescript/packages/zod-bridge"

  manual-release-bundle-py:
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.manual_release_bundle == 'all' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - package_dir: python/packages/core
          - package_dir: python/packages/client
          - package_dir: python/packages/adapters/pydantic
          - package_dir: python/packages/pydantic-extractor
          - package_dir: python/packages/pydantic-bridge
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.manual_source_ref || github.ref_name }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync
        working-directory: python

      - name: Build distribution
        run: uv build --out-dir dist --clear
        working-directory: ${{ matrix.package_dir }}

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: ${{ matrix.package_dir }}/dist
          skip-existing: true
