name: Release Please

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    outputs:
      ts-core--release_created: ${{ steps.release.outputs['typescript/packages/core--release_created'] }}
      ts-client--release_created: ${{ steps.release.outputs['typescript/packages/client--release_created'] }}
      ts-zod--release_created: ${{ steps.release.outputs['typescript/packages/adapters/zod--release_created'] }}
      ts-zod-extractor--release_created: ${{ steps.release.outputs['typescript/packages/zod-extractor--release_created'] }}
      ts-zod-bridge--release_created: ${{ steps.release.outputs['typescript/packages/zod-bridge--release_created'] }}
      py-core--release_created: ${{ steps.release.outputs['python/packages/core--release_created'] }}
      py-client--release_created: ${{ steps.release.outputs['python/packages/client--release_created'] }}
      py-pydantic--release_created: ${{ steps.release.outputs['python/packages/adapters/pydantic--release_created'] }}
      py-pydantic-extractor--release_created: ${{ steps.release.outputs['python/packages/pydantic-extractor--release_created'] }}
      py-pydantic-bridge--release_created: ${{ steps.release.outputs['python/packages/pydantic-bridge--release_created'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ github.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Trigger CI for release-please PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          prs=$(gh pr list --repo ${{ github.repository }} --state open --json headRefName --jq '.[] | select(.headRefName | startswith("release-please--")) | .headRefName')

          for branch in $prs; do
            echo "Dispatching CI for branch: $branch"
            gh workflow run CI --repo ${{ github.repository }} --ref "$branch"
          done

  release-ts:
    needs: release-please
    if: |
      needs.release-please.outputs.ts-core--release_created == 'true' ||
      needs.release-please.outputs.ts-client--release_created == 'true' ||
      needs.release-please.outputs.ts-zod--release_created == 'true' ||
      needs.release-please.outputs.ts-zod-extractor--release_created == 'true' ||
      needs.release-please.outputs.ts-zod-bridge--release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: typescript

      - name: Build packages
        run: pnpm run build
        working-directory: typescript

      - name: Typecheck packages
        run: pnpm run typecheck
        working-directory: typescript

      - name: Publish @vectorfyco/valbridge-core
        if: needs.release-please.outputs.ts-core--release_created == 'true'
        run: pnpm publish --no-git-checks --access public
        working-directory: typescript/packages/core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @vectorfyco/valbridge
        if: needs.release-please.outputs.ts-client--release_created == 'true'
        run: pnpm publish --no-git-checks --access public
        working-directory: typescript/packages/client
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @vectorfyco/valbridge-zod
        if: needs.release-please.outputs.ts-zod--release_created == 'true'
        run: pnpm publish --no-git-checks --access public
        working-directory: typescript/packages/adapters/zod
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @vectorfyco/valbridge-zod-extractor
        if: needs.release-please.outputs.ts-zod-extractor--release_created == 'true'
        run: pnpm publish --no-git-checks --access public
        working-directory: typescript/packages/zod-extractor
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @vectorfyco/valbridge-zod-bridge
        if: needs.release-please.outputs.ts-zod-bridge--release_created == 'true'
        run: pnpm publish --no-git-checks --access public
        working-directory: typescript/packages/zod-bridge
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  release-py:
    needs: release-please
    if: |
      needs.release-please.outputs.py-core--release_created == 'true' ||
      needs.release-please.outputs.py-client--release_created == 'true' ||
      needs.release-please.outputs.py-pydantic--release_created == 'true' ||
      needs.release-please.outputs.py-pydantic-extractor--release_created == 'true' ||
      needs.release-please.outputs.py-pydantic-bridge--release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync
        working-directory: python

      - name: Publish valbridge-core
        if: needs.release-please.outputs.py-core--release_created == 'true'
        run: |
          uv build
          uv publish --token ${{ secrets.PYPI_TOKEN }}
        working-directory: python/packages/core

      - name: Publish valbridge
        if: needs.release-please.outputs.py-client--release_created == 'true'
        run: |
          uv build
          uv publish --token ${{ secrets.PYPI_TOKEN }}
        working-directory: python/packages/client

      - name: Publish valbridge-pydantic
        if: needs.release-please.outputs.py-pydantic--release_created == 'true'
        run: |
          uv build
          uv publish --token ${{ secrets.PYPI_TOKEN }}
        working-directory: python/packages/adapters/pydantic

      - name: Publish valbridge-pydantic-extractor
        if: needs.release-please.outputs.py-pydantic-extractor--release_created == 'true'
        run: |
          uv build
          uv publish --token ${{ secrets.PYPI_TOKEN }}
        working-directory: python/packages/pydantic-extractor

      - name: Publish valbridge-pydantic-bridge
        if: needs.release-please.outputs.py-pydantic-bridge--release_created == 'true'
        run: |
          uv build
          uv publish --token ${{ secrets.PYPI_TOKEN }}
        working-directory: python/packages/pydantic-bridge
