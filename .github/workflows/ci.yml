name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Detect which paths changed
  changes:
    runs-on: ubuntu-latest
    outputs:
      cli: ${{ steps.filter.outputs.cli }}
      release_pr: ${{ steps.release_pr.outputs.value }}
      typescript: ${{ steps.filter.outputs.typescript }}
      python: ${{ steps.filter.outputs.python }}
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Detect release-please PR branch
        id: release_pr
        run: |
          branch="${{ github.head_ref || github.ref_name }}"
          if [[ "$branch" == release-please--* ]]; then
            echo "value=true" >>"$GITHUB_OUTPUT"
          else
            echo "value=false" >>"$GITHUB_OUTPUT"
          fi
      - uses: dorny/paths-filter@v4.0.1
        id: filter
        with:
          filters: |
            cli:
              - 'cli/**'
            typescript:
              - 'typescript/**'
            python:
              - 'python/**'

  commitlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2.2.0

      - name: Install dependencies
        run: bun install

      - name: Validate commits
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            bunx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose
          else
            bunx commitlint --from HEAD~1 --to HEAD --verbose
          fi

  go-test:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.cli == 'true' && needs.changes.outputs.release_pr != 'true'
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-go@v6.4.0
        with:
          go-version: "1.24"
          cache-dependency-path: cli/go.sum

      - name: Run tests
        run: go test ./... -v
        working-directory: cli

      - name: Run vet
        run: go vet ./...
        working-directory: cli

  ts-build:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.typescript == 'true' && needs.changes.outputs.release_pr != 'true'
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: pnpm/action-setup@v5.0.0
        with:
          version: 10

      - uses: actions/setup-node@v6.3.0
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: typescript/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
        working-directory: typescript

      - name: Build TypeScript core package
        run: pnpm --filter @vectorfyco/valbridge-core run build
        working-directory: typescript

      - name: Type check Zod adapter package
        run: pnpm --filter @vectorfyco/valbridge-zod run typecheck
        working-directory: typescript

  ts-zod-compat:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.typescript == 'true' && needs.changes.outputs.release_pr != 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: zod-4.3.6
            zod: 4.3.6
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-go@v6.4.0
        with:
          go-version: "1.24"

      - uses: pnpm/action-setup@v5.0.0
        with:
          version: 10

      - uses: actions/setup-node@v6.3.0
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: typescript/pnpm-lock.yaml

      - name: Pin Zod version under test
        env:
          ZOD_VERSION: ${{ matrix.zod }}
        run: |
          node <<'NODE'
          const fs = require("fs");

          const updates = [
            ["typescript/packages/adapters/zod/package.json", (pkg) => {
              pkg.devDependencies.zod = process.env.ZOD_VERSION;
            }],
            ["typescript/example/package.json", (pkg) => {
              pkg.dependencies.zod = process.env.ZOD_VERSION;
            }],
          ];

          for (const [file, update] of updates) {
            const pkg = JSON.parse(fs.readFileSync(file, "utf8"));
            update(pkg);
            fs.writeFileSync(file, JSON.stringify(pkg, null, "\t") + "\n");
          }
          NODE

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
        working-directory: typescript

      - name: Build all packages
        run: pnpm run build
        working-directory: typescript

      - name: Type check all packages
        run: pnpm run typecheck
        working-directory: typescript

      - name: Run Zod unit tests
        run: pnpm test
        working-directory: typescript/packages/adapters/zod

      - name: Run Zod type-fidelity harness
        run: pnpm run type-fidelity
        working-directory: typescript/packages/adapters/zod

      - name: Run Zod compliance
        run: pnpm run compliance
        working-directory: typescript/packages/adapters/zod

  py-build:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.python == 'true' && needs.changes.outputs.release_pr != 'true'
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            python/uv.lock
            python/**/pyproject.toml

      - name: Install dependencies
        run: uv sync
        working-directory: python

      - name: Verify tested Pydantic version
        run: uv run python -c "from pydantic.version import VERSION; assert VERSION == '2.12.5', VERSION; print(VERSION)"
        working-directory: python

      - name: Verify package version sync
        run: uv run python .ci/check_version_sync.py
        working-directory: python

      - name: Type check with mypy
        run: uv run mypy packages/
        working-directory: python

      - name: Run tests
        run: uv run pytest
        working-directory: python

  cli-install-smoke:
    runs-on: ubuntu-latest
    needs: changes
    if: |
      needs.changes.outputs.release_pr != 'true' && (
        needs.changes.outputs.cli == 'true' ||
        needs.changes.outputs.typescript == 'true' ||
        needs.changes.outputs.python == 'true'
      )
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-go@v6.4.0
        with:
          go-version: "1.24"
          cache-dependency-path: cli/go.sum

      - uses: pnpm/action-setup@v5.0.0
        with:
          version: 10

      - uses: actions/setup-node@v6.3.0
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: typescript/pnpm-lock.yaml

      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            python/uv.lock
            python/**/pyproject.toml

      - name: Build local valbridge binary
        run: go build -o "${RUNNER_TEMP}/valbridge" .
        working-directory: cli

      - name: Smoke test npm CLI launcher
        env:
          VALBRIDGE_CLI_BIN: ${{ runner.temp }}/valbridge
        run: |
          pnpm run build
          tarball=$(pnpm pack --pack-destination "${RUNNER_TEMP}" | tail -n 1)
          npm exec --yes --package "${tarball}" valbridge -- --help
        working-directory: typescript/packages/cli

      - name: Smoke test PyPI CLI launcher
        env:
          VALBRIDGE_CLI_BIN: ${{ runner.temp }}/valbridge
        run: |
          uv sync
          uv build --wheel --out-dir "${RUNNER_TEMP}/py-dist" --clear
          wheel=$(find "${RUNNER_TEMP}/py-dist" -name 'valbridge_cli-*.whl' | head -n 1)
          uv tool run --from "${wheel}" valbridge --help
        working-directory: python/packages/cli

  # Passthrough jobs for branch protection
  go-test-result:
    runs-on: ubuntu-latest
    needs: [changes, go-test]
    if: always()
    steps:
      - run: |
          if [ "${{ needs.go-test.result }}" = "failure" ]; then
            echo "go-test failed"
            exit 1
          fi
          echo "go-test passed or was skipped"

  ts-build-result:
    runs-on: ubuntu-latest
    needs: [changes, ts-build, ts-zod-compat, cli-install-smoke]
    if: always()
    steps:
      - run: |
          if [ "${{ needs.ts-build.result }}" = "failure" ]; then
            echo "ts-build failed"
            exit 1
          fi
          if [ "${{ needs.ts-zod-compat.result }}" = "failure" ]; then
            echo "ts-zod-compat failed"
            exit 1
          fi
          if [ "${{ needs.cli-install-smoke.result }}" = "failure" ]; then
            echo "cli-install-smoke failed"
            exit 1
          fi
          echo "ts-build passed or was skipped"

  py-build-result:
    runs-on: ubuntu-latest
    needs: [changes, py-build, cli-install-smoke]
    if: always()
    steps:
      - run: |
          if [ "${{ needs.py-build.result }}" = "failure" ]; then
            echo "py-build failed"
            exit 1
          fi
          if [ "${{ needs.cli-install-smoke.result }}" = "failure" ]; then
            echo "cli-install-smoke failed"
            exit 1
          fi
          echo "py-build passed or was skipped"
